<div class="login-page">

  <div class="login-content">

    <h1>Clear Vision Store</h1>
    <p>See better. Look better. Shop better.</p>

    <div class="login-form">

      <input type="text"
             [(ngModel)]="username"
             placeholder="Username">

      <input type="password"
             [(ngModel)]="password"
             placeholder="Password">

      <button (click)="checkLogin()">→ Enter Store</button>

    </div>

  </div>

</div>
