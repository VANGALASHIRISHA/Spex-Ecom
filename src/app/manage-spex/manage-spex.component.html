<div class="container-fluid">
    <div class="row">
        <div class="col-md-4" *ngFor="let p of products">
            <div class="card">
                <div class="card-header">
                    <img [src]="p.productImage" alt="" height="200" width="200">
                    <h5 class="card-title">{{p.productName}}</h5>
                </div>
                <div class="card-body">
                    <h6>Model:{{p.productModel}}</h6>
                    <p class="badge">Price:{{p.productPrice}}</p>
                </div>
                <div class="card-footer">
                    <button class="btn btn-success" (click)="deleteNow(p.productId)">Delete</button>
                    <button class="btn btn-primary ms-2" data-bs-toggle="modal"
                        data-bs-target="#updateModal" (click)="updateToDummy(p)">Update</button>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="updateModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Update Prdouct</h2>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label for="" class="form-label">ProductName</label>
                        <input type="text" class="form-control" [(ngModel)]="dummy.productName">
                    </div>
                    <div class="form-group">
                        <label for="" class="form-label">ProductPrice</label>
                        <input type="text" class="form-control" [(ngModel)]="dummy.productPrice">
                    </div>

                    <div class="form-group">
                        <label for="" class="form-label">ProductModel</label>
                        <input type="text" class="form-control" [(ngModel)]="dummy.productModel">
                    </div>

                    <div class="form-group">
                        <label for="" class="form-label">ProductImage</label>
                        <input type="text" class="form-control" [(ngModel)]="dummy.productImage">
                    </div>

                    <div class="form-group mt-2">
                        <button class="btn btn-primary" (click)="storeinSerial()" data-bs-dismiss="modal">Update
                            Now</button>

                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
